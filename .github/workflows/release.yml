name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.x"
          cache: npm
          cache-dependency-path: src/TanoDevClip.UI/package-lock.json

      - name: Install UI dependencies
        working-directory: src/TanoDevClip.UI
        run: npm ci

      - name: Validate UI
        working-directory: src/TanoDevClip.UI
        run: |
          npm run lint
          npm run build

      - name: Run tests
        run: dotnet test TanoDevClip.sln -c Release

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Publish application
        shell: pwsh
        run: |
          dotnet publish `
            src/TanoDevClip.App/TanoDevClip.App.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Version=${{ steps.version.outputs.value }} `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -o artifacts/publish

      - name: Copy packaged UI
        shell: pwsh
        run: |
          New-Item artifacts/publish/ui -ItemType Directory -Force
          Copy-Item src/TanoDevClip.UI/dist/* `
            artifacts/publish/ui `
            -Recurse `
            -Force

      - name: Restore .NET tools
        run: dotnet tool restore

      - name: Download previous release
        continue-on-error: true
        shell: pwsh
        run: |
          dotnet tool run vpk -- download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}"

      - name: Package release
        shell: pwsh
        run: |
          dotnet tool run vpk -- pack `
            --packId ProtanoSoftware.TanoDevClip `
            --packVersion ${{ steps.version.outputs.value }} `
            --packDir artifacts/publish `
            --mainExe TanoDevClip.App.exe `
            --packTitle "TanoDev Clip" `
            --icon src/TanoDevClip.App/Assets/AppIcon.ico `
            --shortcuts Desktop,StartMenuRoot `
            --framework webview2

      - name: Publish GitHub Release
        shell: pwsh
        run: |
          dotnet tool run vpk -- upload github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --token "${{ secrets.GITHUB_TOKEN }}" `
            --publish `
            --releaseName "TanoDev Clip ${{ steps.version.outputs.value }}" `
            --tag "${{ github.ref_name }}"
