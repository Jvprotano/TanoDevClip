name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build and test
    runs-on: windows-latest

    env:
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: src/TanoDevClip.UI/package-lock.json

      - name: Install UI dependencies
        working-directory: src/TanoDevClip.UI
        run: npm ci

      - name: Lint UI
        working-directory: src/TanoDevClip.UI
        run: npm run lint

      - name: Build UI
        working-directory: src/TanoDevClip.UI
        run: npm run build

      - name: Restore .NET dependencies
        run: dotnet restore TanoDevClip.sln

      - name: Run .NET tests
        run: dotnet test TanoDevClip.sln --configuration Release --no-restore

      - name: Publish desktop application
        run: >
          dotnet publish
          src/TanoDevClip.App/TanoDevClip.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          --output artifacts/publish

      - name: Copy packaged UI
        shell: pwsh
        run: |
          New-Item `
            artifacts/publish/ui `
            -ItemType Directory `
            -Force | Out-Null

          Copy-Item `
            src/TanoDevClip.UI/dist/* `
            artifacts/publish/ui `
            -Recurse `
            -Force

      - name: Validate publish output
        shell: pwsh
        run: |
          $executable = "artifacts/publish/TanoDevClip.App.exe"
          $uiIndex = "artifacts/publish/ui/index.html"

          if (-not (Test-Path $executable)) {
              throw "Published executable was not found: $executable"
          }

          if (-not (Test-Path $uiIndex)) {
              throw "Packaged UI was not found: $uiIndex"
          }

          Write-Host "Publish layout validated successfully."
